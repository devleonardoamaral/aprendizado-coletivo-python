site_name: Aprendizado Coletivo Python
site_description: Construção coletiva de conhecimentos sobre Python, desenvolvimento e tecnologia.
site_url: https://devleonardoamaral.github.io/aprendizado-coletivo-python/
repo_name: GitHub
repo_url: https://github.com/devleonardoamaral/aprendizado-coletivo-python/
use_directory_urls: true

theme:
  name: material
  language: pt-BR
  custom_dir: overrides
  logo: assets/images/logo.png
  favicon: assets/images/favicon.ico
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  features:
    - navigation.footer
  palette:
    # dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: yellow
      accent: deep purple
    # light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

nav:
  - index.md
  - Python:
      - Fundamentos:
          - Tipos Primitivos: posts/python/fundamentos/tipos_primitivos.md
  - Sobre: collaborate/about.md

plugins:
  - meta
  - search
  - blog:
      blog_dir: .
      archive: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
